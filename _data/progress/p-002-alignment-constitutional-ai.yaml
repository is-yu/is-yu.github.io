finding: |
  Models can critique and revise their own outputs according to a set of
  constitutional principles, reducing dependence on human labelers for
  alignment while maintaining helpfulness.
impact_on_question: |
  Introduces a scalable alignment approach that reduces reliance on human
  evaluators, a step toward aligning superhuman systems. However, the
  constitutional principles are still human-authored.
advancement_level: "major"
