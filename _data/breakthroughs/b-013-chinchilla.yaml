key_findings:
  - finding: |
      Current large language models are significantly over-parameterized and
      under-trained. For compute-optimal training, model size and training
      data should be scaled equally.
    significance: |
      Showed that a 70B model trained on 4x more data outperforms a 280B
      model, fundamentally changing how compute budgets are allocated.
significance_level: "major"
new_questions_raised: []
context: |
  The Chinchilla scaling laws corrected Kaplan et al.'s recommendation to
  prioritize model size. This had immediate practical impact — subsequent
  models (LLaMA, etc.) adopted compute-optimal ratios.
summary: |
  Chinchilla established that models should be trained on far more data than
  previously assumed, rebalancing the compute-optimal frontier for LLMs.
