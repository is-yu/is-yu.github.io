context: |
  GPT showed that generative pre-training on next-token prediction creates
  powerful general-purpose representations, complementing BERT's bidirectional
  approach released months later.
summary: |
  GPT demonstrated that generative pre-training on unlabeled text produces
  transferable language representations, launching the foundation model era.
