id: "b-015"
slug: "toolformer"
title: "Toolformer: Language Models Can Teach Themselves to Use Tools"
paper_refs:
  - "2302.04761"
authors:
  - "Timo Schick"
  - "Jane Dwivedi-Yu"
  - "Roberto Dessi"
  - "Roberta Raileanu"
  - "Maria Lomeli"
  - "Luke Zettlemoyer"
