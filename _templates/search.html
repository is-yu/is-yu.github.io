{% extends "base.html" %}
{% block title %}Search — AI Breakthroughs{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Search</h2>
</div>

<input type="text" class="search-input" id="search-input" placeholder="Search questions, breakthroughs, and findings..." autofocus>

<div class="search-results" id="search-results">
    <p style="color: var(--color-text-muted); text-align: center; padding: 32px;">
        Start typing to search across all questions and breakthroughs.
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ base_url }}/static/js/search.js"></script>
{% endblock %}
