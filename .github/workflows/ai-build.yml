name: AI Breakthroughs — Build

on:
  push:
    branches: [main]
    paths:
      - '_data/**'
      - '_templates/**'
      - '_static/**'
      - '_generator/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyYAML pydantic Jinja2

      - name: Validate data
        run: python -m _pipeline.validate_data

      - name: Build site
        run: python -m _generator.build

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-breakthroughs/
          git diff --staged --quiet || git commit -m "Auto-build AI Breakthroughs site"
          git push
